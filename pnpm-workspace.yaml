packages:
  - packages/*
allowBuilds:
  "@foundry-rs/forge": true
  "@swc/core": true
  "@trufflesuite/bigint-buffer": true
  bigint-buffer: true
  bufferutil: true
  core-js-pure: true
  es5-ext: true
  keccak: true
  protobufjs: true
  secp256k1: true
  unrs-resolver: true
  utf-8-validate: true
minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.63.0'
  - '@typescript-eslint/parser@8.63.0'
  - '@typescript-eslint/project-service@8.63.0'
  - '@typescript-eslint/scope-manager@8.63.0'
  - '@typescript-eslint/tsconfig-utils@8.63.0'
  - '@typescript-eslint/type-utils@8.63.0'
  - '@typescript-eslint/types@8.63.0'
  - '@typescript-eslint/typescript-estree@8.63.0'
  - '@typescript-eslint/utils@8.63.0'
  - '@typescript-eslint/visitor-keys@8.63.0'
  - typescript-eslint@8.63.0
overrides:
  "@solana/web3.js": ^1.98.4
  ethers: ^5.8.0
  hardhat-deploy: ^0.12.4
  # Security floors for vulnerable transitive deps (Dependabot); ranged keys avoid cross-major breaks
  "axios@0": ^0.33.0
  "axios@1": ^1.18.1
  "bn.js@4": ^4.12.4
  "cookie@0": ^0.7.2
  "form-data@2": ^2.5.6
  "js-yaml@4": ^4.3.0
  lodash: ^4.18.1
  "qs@6": ^6.15.3
  serialize-javascript: ^7.0.7
  "tar@4": ^7.5.19
  tmp: ^0.2.7
  "tough-cookie@2": ^4.1.4
  # protocol-kit pulls web3 1.x only for its unused Web3 adapter; stub the entire dead branch
  "undici@5": ^6.27.0
  web3: npm:empty-npm-package@1.0.0
  web3-core: npm:empty-npm-package@1.0.0
  "uuid@8": ^11.1.1
  "uuid@9": ^11.1.1
  "ws@8": ^8.21.0
