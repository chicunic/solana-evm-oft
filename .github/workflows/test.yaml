name: Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm test

  test-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      # rustup auto-installs the toolchain pinned in rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/solana-evm-oft

      - run: cargo test
        working-directory: packages/solana-evm-oft
